<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI | Smart Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Prism.js for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="sparkles"></i>
                <span>Gemini AI</span>
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <i data-lucide="plus"></i>
                New Chat
            </button>
            <div class="history-list" id="historyList">
                <!-- History items will appear here -->
            </div>
            <div class="user-profile">
                <div class="avatar">R</div>
                <div class="user-info">
                    <span class="username">Rashma</span>
                    <span class="status">Online</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="actions">
                    <button class="icon-btn" title="Toggle Theme" id="themeToggle">
                        <i data-lucide="sun"></i>
                    </button>
                </div>
            </header>

            <div class="chat-container">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i data-lucide="bot"></i>
                    </div>
                    <h1>How can I help you today?</h1>
                    <p>Ask me anything, I'm here to assist with your questions, code, or creative ideas.</p>
                    <div class="suggestions">
                        <button class="suggestion-card" onclick="setQuestion('Explain quantum computing simply')">
                            <i data-lucide="atom"></i>
                            <span>Quantum Computing</span>
                        </button>
                        <button class="suggestion-card" onclick="setQuestion('Write a Python script to scrape a website')">
                            <i data-lucide="code"></i>
                            <span>Python Scraper</span>
                        </button>
                        <button class="suggestion-card" onclick="setQuestion('Help me plan a 3-day trip to Tokyo')">
                            <i data-lucide="map"></i>
                            <span>Travel Plan</span>
                        </button>
                    </div>
                </div>
                <div class="chat-window" id="chatWindow">
                    <!-- Messages will appear here -->
                </div>
            </div>

            <footer class="input-container">
                <div class="input-wrapper">
                    <textarea id="questionInput" placeholder="Message Gemini AI..." rows="1"></textarea>
                    <button class="send-btn" id="submitBtn">
                        <i data-lucide="send-horizontal"></i>
                    </button>
                </div>
                <p class="disclaimer">Gemini AI can make mistakes. Check important info.</p>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        function setQuestion(text) {
            const input = document.getElementById('questionInput');
            input.value = text;
            input.focus();
            // Automatically trigger height adjustment
            input.dispatchEvent(new Event('input'));
        }
    </script>
</body>
</html>
